- name: Destroy Vertex AI ML Pipeline
  hosts: localhost
  gather_facts: false
  vars:
    gcp_project: "my-gcp-project"
    gcp_region: "us-east1"
    resource_name: "vertex-ai"
    
  tasks:
  - name: Destroy Vertex AI endpoint with Model Garden deployment
    google.cloud.gcp_vertexai_endpoint_with_model_garden_deployment:
      state: absent
      publisher_model_name: "publishers/google/models/paligemma@paligemma-224-float32"
      display_name: "{{ resource_name }}-endpoint"
      endpoint_config:
        endpoint_display_name: "{{ resource_name }}-endpoint"
      model_config:
        model_display_name: "{{ resource_name }}-model"
      location: "{{ gcp_region }}"
      project: "{{ gcp_project }}"

  - name: Destroy Vertex AI NETWORK
    google.cloud.gcp_compute_network:
      name: "{{ resource_name }}-network"
      state: absent
      project: "{{ gcp_project }}"
